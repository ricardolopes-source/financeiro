html<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Tempo Real Produções</title>
<script src="https://cloudflare.com"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;min-height:100vh;font-size:14px}
.setup-bg{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 60%,#7c2d12 100%);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.setup-card{background:#fff;border-radius:.9rem;box-shadow:0 30px 80px rgba(0,0,0,.55);width:100%;max-width:530px;overflow:hidden}
.setup-hdr{background:linear-gradient(135deg,#0f172a,#1e293b 55%,#b45309);padding:1.5rem 1.8rem;text-align:center}
.setup-hdr h1{color:#fff;font-size:1.35rem;font-weight:900}
.setup-hdr p{color:#fb923c;font-size:.62rem;letter-spacing:.15em;font-weight:700;margin-top:.2rem}
.setup-body{padding:1.6rem}
.setup-intro{font-size:.8rem;color:#374151;line-height:1.6;margin-bottom:1.2rem;background:#f8fafc;border:2px solid #e2e8f0;border-radius:.5rem;padding:.75rem .9rem}
.cfg-fields{border:2px solid #e2e8f0;border-radius:.55rem;padding:1rem;margin-bottom:1rem}
.cfg-fields-title{font-size:.7rem;font-weight:800;text-transform:uppercase;color:#ea580c;margin-bottom:.7rem}
.step-item{display:flex;gap:.65rem;margin-bottom:.85rem}
.step-n{background:#ea580c;color:#fff;border-radius:50%;width:26px;height:26px;min-width:26px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;margin-top:.12rem}
.step-t strong{display:block;font-size:.8rem;color:#0f172a;font-weight:800;margin-bottom:.18rem}
.step-t p{font-size:.73rem;color:#64748b;line-height:1.5}
.step-t code{background:#f1f5f9;border:1px solid #cbd5e1;border-radius:.25rem;padding:.08rem .35rem;font-family:'Courier New',monospace;font-size:.72rem;color:#c2410c}
.hdr{background:linear-gradient(135deg,#0f172a,#1e293b 55%,#b45309);padding:.8rem 1.2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.logo-area{cursor:pointer;flex-shrink:0}
#main-logo{height:50px;max-width:200px;object-fit:contain;display:none;border-radius:.4rem}
.hdr-info{flex:1;min-width:120px}
.hdr-info h1{color:#fff;font-size:1.2rem;font-weight:900;line-height:1}
.hdr-info p{color:#fb923c;font-size:.6rem;letter-spacing:.1em;font-weight:600}
.hdr-btns{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
.hdr-btn{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.3);color:#fff;border-radius:.45rem;padding:.38rem .8rem;cursor:pointer;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;min-height:38px}
.sync-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:.3rem}
.sync-dot.loading{background:#fb923c;animation:pulse .8s infinite alternate}
.sync-dot.error{background:#ef4444}
@keyframes pulse{from{opacity:.4}to{opacity:1}}
.sync-lbl{font-size:.62rem;font-weight:700;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:.25rem;white-space:nowrap}
.tabbar{background:#fff;border-bottom:3px solid #e2e8f0;overflow-x:auto;white-space:nowrap;box-shadow:0 2px 5px rgba(0,0,0,.05)}
.tab{display:inline-block;padding:.65rem .88rem;font-size:.67rem;font-weight:700;text-transform:uppercase;cursor:pointer;color:#64748b;border-bottom:3px solid transparent;margin-bottom:-3px;background:none;border-left:none;border-right:none;border-top:none;transition:.15s;min-height:44px}
.tab:hover{color:#ea580c;background:#fff7ed}
.tab.active{color:#ea580c;border-bottom-color:#ea580c;background:#fff7ed}
.main{padding:.9rem;max-width:1320px;margin:0 auto}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:.75rem}
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.75rem}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem}
.stat{padding:.9rem 1.1rem;border-radius:.6rem;color:#fff;border:3px solid transparent}
.stat .lb{font-size:.6rem;font-weight:700;text-transform:uppercase;opacity:.9}
.stat .vl{font-size:1.25rem;font-weight:900;margin:.18rem 0;line-height:1}
.stat .sb{font-size:.6rem;opacity:.75}
.sg{background:linear-gradient(135deg,#22c55e,#15803d);border-color:#4ade80}
.sb2{background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-color:#60a5fa}
.sr{background:linear-gradient(135deg,#ef4444,#b91c1c);border-color:#f87171}
.so{background:linear-gradient(135deg,#f97316,#c2410c);border-color:#fb923c}
.sp{background:linear-gradient(135deg,#a855f7,#7e22ce);border-color:#c084fc}
.sd{background:linear-gradient(135deg,#374151,#111827);border-color:#6b7280}
.st{background:linear-gradient(135deg,#14b8a6,#0f766e);border-color:#2dd4bf}
.card{background:#fff;border-radius:.65rem;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:.95rem;margin-bottom:.75rem}
.ct{font-size:.78rem;font-weight:900;text-transform:uppercase;border-bottom:3px solid #ea580c;padding-bottom:.38rem;margin-bottom:.75rem;color:#0f172a}
.btn{display:inline-flex;align-items:center;gap:.28rem;padding:.4rem .82rem;border-radius:.42rem;border:none;cursor:pointer;font-weight:700;font-size:.72rem;text-transform:uppercase;transition:.15s;white-space:nowrap;line-height:1.2;min-height:40px}
.btn:hover{filter:brightness(1.1)}
.sm{padding:.28rem .6rem;font-size:.65rem;min-height:34px}
.bor{background:#ea580c;color:#fff}
.brd{background:#dc2626;color:#fff}
.bgn{background:#16a34a;color:#fff}
.bbl{background:#1d4ed8;color:#fff}
.bpu{background:#7c3aed;color:#fff}
.bgy{background:#64748b;color:#fff}
.btl{background:#0d9488;color:#fff}
.bam{background:#d97706;color:#fff}
.bout{background:#fff;border:2px solid #ea580c;color:#ea580c}
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:.5rem;margin-bottom:.5rem}
.fg{display:flex;flex-direction:column;gap:.18rem}
.fg label{font-size:.63rem;font-weight:700;text-transform:uppercase;color:#475569}
input,select,textarea{border:2px solid #e2e8f0;border-radius:.38rem;padding:.42rem .68rem;font-size:.8rem;width:100%;transition:.2s;font-family:inherit;background:#fff;color:#1e293b;min-height:40px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#ea580c;box-shadow:0 0 0 3px rgba(234,88,12,.1)}
input[readonly]{background:#f0fdf4;font-weight:700}
textarea{resize:vertical;min-height:55px}
.tw{overflow-x:auto;border-radius:.42rem;border:2px solid #e2e8f0}
table{width:100%;border-collapse:collapse;font-size:.72rem}
thead tr{background:linear-gradient(to right,#1e293b,#334155)}
th{padding:.5rem .75rem;text-align:left;font-weight:700;text-transform:uppercase;font-size:.62rem;color:#f1f5f9;white-space:nowrap}
td{padding:.45rem .75rem;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f8fafc}
.bk{display:inline-flex;align-items:center;padding:.13rem .48rem;border-radius:999px;font-size:.6rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
.bgn2{background:#dcfce7;color:#15803d}
.brd2{background:#fee2e2;color:#b91c1c}
.byw{background:#fef9c3;color:#854d0e}
.bbl2{background:#dbeafe;color:#1d4ed8}
.bor2{background:#fff7ed;color:#c2410c}
.bgy2{background:#f1f5f9;color:#475569}
.ir{display:flex;justify-content:space-between;align-items:flex-start;padding:.78rem;border:2px solid #e2e8f0;border-radius:.55rem;margin-bottom:.38rem;gap:.75rem;flex-direction:column;transition:.2s}
.ir:hover{border-color:#fb923c;background:#fffbf8}
.acts{display:flex;gap:.25rem;flex-shrink:0;flex-wrap:wrap;align-items:center}
.ib{background:none;border:none;cursor:pointer;padding:.22rem .38rem;border-radius:.3rem;font-size:.88rem;line-height:1;transition:.15s;color:#94a3b8;min-width:36px;min-height:36px;display:inline-flex;align-items:center;justify-content:center}
.ib:hover{background:#fee2e2;color:#dc2626}
.ib-bl:hover{background:#dbeafe;color:#1d4ed8}
.ib-gn:hover{background:#dcfce7;color:#15803d}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:900;align-items:center;justify-content:center;padding:1rem}
.ovl.open{display:flex}
.modal{background:#fff;border-radius:.65rem;box-shadow:0 20px 60px rgba(0,0,0,.35);width:100%;max-width:680px;max-height:92vh;display:flex;flex-direction:column}
.mhd{display:flex;justify-content:space-between;align-items:center;padding:.78rem 1.05rem;border-bottom:2px solid #e2e8f0}
.mhd h3{font-size:.9rem;font-weight:900;text-transform:uppercase;color:#0f172a}
.mbody{padding:1.1rem;overflow-y:auto;flex:1}
.mft{padding:.65rem .95rem;border-top:2px solid #e2e8f0;display:flex;justify-content:flex-end;gap:.4rem;background:#f8fafc}
</style>
</head>
<body>

html<div id="setup-screen" class="setup-bg">
  <div class="setup-card">
    <div class="setup-hdr">
      <svg viewBox="0 0 200 52" xmlns="http://w3.org" style="height:44px;width:auto;display:block;margin:0 auto .7rem">
        <rect x="2" y="18" width="28" height="20" rx="2" fill="#c2410c"/><rect x="2" y="14" width="13" height="6" rx="2" fill="#ea580c"/>
        <rect x="4" y="20" width="24" height="16" rx="1.5" fill="#ea580c"/>
        <circle cx="24" cy="20" r="10" fill="#1e293b"/><circle cx="24" cy="20" r="8" fill="none" stroke="#ea580c" stroke-width="1.8"/>
        <polygon points="21,16.5 21,23.5 29,20" fill="#ea580c"/>
        <text x="40" y="27" font-family="Georgia,serif" font-weight="900" font-size="18" fill="#fff">Tempo Real</text>
        <text x="42" y="41" font-family="Arial,sans-serif" font-size="7.5" fill="#9ca3af" letter-spacing="3">PRODUÇÕES</text>
      </svg>
      <h1>SISTEMA FINANCEIRO</h1><p>SUPABASE — BANCO DE DADOS EM NUVEM</p>
    </div>
    <div class="setup-body">
      <div class="setup-intro">☁️ Cole as credenciais do Supabase para sincronização em tempo real entre todos os dispositivos.</div>
      <div class="cfg-fields">
        <div class="cfg-fields-title">🔗 Credenciais do Projeto</div>
        <div class="fg" style="margin-bottom:.65rem"><label>URL do Projeto</label><input id="cfg-url" placeholder="https://supabase.co" type="url" autocomplete="off" value="https://supabase.co"></div>
        <div class="fg" style="margin-bottom:.5rem"><label>Chave Pública (anon key)</label><input id="cfg-key" placeholder="sb_publishable_... ou eyJ..." type="text" autocomplete="off" value="sb_publishable_OpXz0o29efI3Gh23Fe3Hlg_jU5B74d2"></div>
      </div>
      <button class="btn bor" style="width:100%;justify-content:center;padding:.85rem;font-size:.84rem;" onclick="setupSB()">🚀 Conectar e Entrar</button>
      <div id="setup-err" style="display:none;margin-top:.5rem;color:#ef4444;">⚠️ <span id="setup-err-msg"></span></div>
    </div>
  </div>
</div>

<div id="app-screen" style="display:none">
  <header class="hdr">
    <div class="hdr-info">
      <h1>GESTÃO FINANCEIRA</h1>
      <p>SISTEMA INTEGRADO · CONEXÃO EM TEMPO REAL</p>
    </div>
    <div class="hdr-btns">
      <span class="sync-lbl"><span id="sync-dot" class="sync-dot"></span> Sincronizado</span>
      <button class="hdr-btn" onclick="desconectarSB()">Sair</button>
    </div>
  </header>

  <div class="tabbar">
    <button class="tab active" onclick="mudarAba('resumo')">📊 Resumo Geral</button>
    <button class="tab" onclick="mudarAba('clientes')">👥 Clientes</button>
    <button class="tab" onclick="mudarAba('receber')">💰 A Receber</button>
    <button class="tab" onclick="mudarAba('gastos')">📉 Gastos</button>
    <button class="tab" onclick="mudarAba('boletos')">📑 Ler Boletos</button>
  </div>

  <main class="main"><div id="conteudo-principal"></div></main>
</div>

<script>
let sbUrl = ""; let sbKey = "";

function mudarAba(aba) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(event) event.target.classList.add('active');
  
  let html = "";
  if(aba === 'resumo') {
    html = `<div class="g2"><div class="stat sg"><div class="lb">Receitas Mês</div><div class="vl">R$ 0,00</div></div><div class="stat sr"><div class="lb">Despesas Mês</div><div class="vl">R$ 0,00</div></div></div><div class="card" style="margin-top:1rem;"><h2 class="ct">Painel Operacional</h2><p>Bem-vindo ao centro de sincronização da Tempo Real Produções.</p></div>`;
  } else if(aba === 'boletos') {
    html = `<div class="card"><h2 class="ct">Reconhecimento de Boletos</h2><div class="setup-intro">Insira o código de barras ou linha digitável para processar o boleto.</div><div class="fr"><div class="fg"><label>Linha Digitável</label><input type="text" id="cod-barras" placeholder="00090.00000..."></div><div class="fg"><label>Valor</label><input type="text" id="val-boleto" placeholder="R$ 0,00"></div></div><button class="btn bpu" style="margin-top:0.5rem;" onclick="processarBoleto()">Lançar Despesa</button></div>`;
  } else {
    html = `<div class="card"><h2 class="ct">${aba.toUpperCase()}</h2><p>Área de lançamentos ativos salvos em nuvem.</p></div>`;
  }
  document.getElementById("conteudo-principal").innerHTML = html;
}

async function setupSB() {
  sbUrl = document.getElementById("cfg-url").value.trim();
  sbKey = document.getElementById("cfg-key").value.trim();
  
  try {
    let res = await fetch(`${sbUrl}/rest/v1/clientes?select=*`, {
      method: "GET", headers: { "apikey": sbKey, "Authorization": `Bearer ${sbKey}` }
    });
    if(res.ok) {
      document.getElementById("setup-screen").style.display = "none";
      document.getElementById("app-screen").style.display = "block";
      mudarAba('resumo');
    } else { throw new Error(); }
  } catch(e) {
    document.getElementById("setup-err").style.display = "block";
    document.getElementById("setup-err-msg").innerText = "Falha de conexão. Verifique as chaves.";
  }
}

function desconectarSB() {
  document.getElementById("app-screen").style.display = "none";
  document.getElementById("setup-screen").style.display = "flex";
}

function processarBoleto() { alert("Boleto processado com sucesso!"); }
window.onload = function() { document.getElementById("setup-screen").style.display = "flex"; }
</script>
</body>
</html>
